<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패스트캠퍼스 대시보드 모음</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F2F4F7;color:#0F1117;padding:40px;}
h1{font-size:20px;font-weight:700;margin-bottom:6px;}
p{font-size:12px;color:#6B7280;margin-bottom:32px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:20px 22px;text-decoration:none;color:inherit;display:block;transition:box-shadow .15s;}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.10);}
.card-dot{width:10px;height:10px;border-radius:3px;margin-bottom:12px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.card-sub{font-size:11px;color:#6B7280;}
</style>
</head>
<body>
<h1>패스트캠퍼스 강의 대시보드</h1>
<p>데이터브릿지랩 · 세계 3등에게 배우는 13개 데이터 분석 프로젝트</p>
<div class="grid">
  <a class="card" href="dash-marketing.html">
    <div class="card-dot" style="background:#2E4A8F"></div>
    <div class="card-title">마케팅 캠페인 대시보드</div>
    <div class="card-sub">채널별 CAC · ROAS · 전환율 퍼포먼스 마케팅 의사결정</div>
  </a>
  <a class="card" href="dash-ab-test.html">
    <div class="card-dot" style="background:#5B4A8A"></div>
    <div class="card-title">A/B 테스트 분석 대시보드</div>
    <div class="card-sub">A/B 테스트 시각화 · 드릴다운 필터 & 자동화 분석</div>
  </a>
  <a class="card" href="dash-pm-kpi.html">
    <div class="card-dot" style="background:#2E3B55"></div>
    <div class="card-title">PM 전략 KPI 맵 대시보드</div>
    <div class="card-sub">OKR-KPI 연결 구조 시각화 · 경영진 보고용 1-page</div>
  </a>
  <a class="card" href="dash-hr.html">
    <div class="card-dot" style="background:#0E7A5F"></div>
    <div class="card-title">HR 채용 퍼널 대시보드</div>
    <div class="card-sub">채용 퍼널 분석 · 채용 현황 & 변동 분석</div>
  </a>
  <a class="card" href="dash-sales.html">
    <div class="card-dot" style="background:#1A5E8A"></div>
    <div class="card-title">세일즈 리텐션 대시보드</div>
    <div class="card-sub">코호트 분석 · 매출 예측 & 변동 고급 분석</div>
  </a>
</div>
</body>
</html>
